<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTBNXH Studio Walkabout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            color: #fff;
            font-family: sans-serif;
            
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 1360px;
            height: 768px;
            overflow: hidden;
            background-color: #111;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.1);
            border: 2px solid #222;
            border-radius: 4px;
        }

        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
        }

        /* Interactive Clickable Zones */
        .hotspot {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease-in-out;
            /* Optional: uncomment below to see the boxes for debugging */
            /* background: rgba(255, 255, 255, 0.2); border: 2px dashed #fff; */
        }
        
        .hotspot:hover {
            border: 2px solid rgba(0, 255, 255, 0.8);
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transform: scale(1.02);
        }

        /* The player avatar */
        .character {
            position: absolute;
            height: 180px; 
            transform: translate(-50%, -100%);
            transition: transform 0.1s linear;
            pointer-events: none;
            z-index: 50; /* Base z-index, updated dynamically */
        }

        #debug-ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            z-index: 9999;
            border: 1px solid #444;
        }

        .instructions { font-size: 14px; margin-bottom: 10px; color: #aaa; }
        .secure-badge { color: #00ff66; font-weight: bold; font-size: 12px; }

        /* App Iframe Modal */
        #app-modal {
            display: none;
            position: absolute;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 90%;
            background: #000;
            z-index: 10000;
            border: 2px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            flex-direction: column;
        }

        #modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
        }

        #modal-title {
            margin: 0;
            font-size: 18px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #close-btn {
            background: #ff3333;
            color: #fff;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        #close-btn:hover { background: #ff0000; }

        #app-iframe {
            width: 100%;
            height: calc(100% - 45px);
            border: none;
            background: #222;
        }
    </style>
</head>
<body>

    <div id="debug-ui">
        <h3 style="margin: 0 0 5px 0;">Studio Engine <span class="secure-badge">🔒 100% LOCAL</span></h3>
        <div class="instructions">Use <b>W A S D</b> to move. Click highlighted items to open apps.</div>
        <div>Player X: <span id="pos-x">0</span> | Y: <span id="pos-y">0</span></div>
    </div>

    <!-- The world container -->
    <div id="game-container">
        <!-- Visual background -->
        <div id="background"></div>
        
        <!-- Interactive Zones (Hotspots) -->
        <!-- Note: adjust left, top, width, and height to match your background perfectly -->
        
        <!-- Killah Vocal Tools (Green) -->
        <div class="hotspot" style="left: 9%; top: 38%; width: 15%; height: 18%;" 
             title="Killah Vocal Tools"
             onclick="openApp('Killah Vocal Tools', 'https://fractal-static.unisat.space/preview/de7415784519c47aeff27c173520fc6dad075abe8e4e4c88ef9e22ea403055a3i0')"></div>

        <!-- RAW (Orange) -->
        <div class="hotspot" style="left: 10%; top: 62%; width: 13%; height: 10%;" 
             title="RAW"
             onclick="openApp('RAW', 'https://static.unisat.space/preview/ee9534fefcded2d0e1b3f24802b9eaa2f3602c86f5f13fc3d30541147df45146i0')"></div>

        <!-- Web builder (Red) -->
        <div class="hotspot" style="left: 42%; top: 40%; width: 12%; height: 15%;" 
             title="Web Builder"
             onclick="openApp('Web Builder', 'https://fractal-static.unisat.space/preview/81bdbc820da10ede1fd88f139133d84833262b883757058106ec1af16720bae8i0')"></div>

        <!-- Bio (Light Blue) -->
        <div class="hotspot" style="left: 70%; top: 18%; width: 10%; height: 16%;" 
             title="Bio"
             onclick="openApp('Bio', 'https://fractal-static.unisat.space/preview/fd6f804447764b6611552e943ef00205606f4bfc1e584bf4deaec6befc9b16e6i0')"></div>

        <!-- KAT (Purple) -->
        <div class="hotspot" style="left: 88%; top: 18%; width: 9%; height: 14%;" 
             title="KAT"
             onclick="openApp('KAT', 'https://objkt.com/curations/objkt/killah-audio-tools-466a3d8f')"></div>

        <!-- Player Sprite -->
        <img src="character_1_transparent.png" id="player" class="character" alt="Avatar">

        <!-- App Iframe Modal -->
        <div id="app-modal">
            <div id="modal-header">
                <h3 id="modal-title">App</h3>
                <button id="close-btn" onclick="closeApp()">X CLOSE</button>
            </div>
            <iframe id="app-iframe" src=""></iframe>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // Modal Logic
        const modal = document.getElementById('app-modal');
        const iframe = document.getElementById('app-iframe');
        const modalTitle = document.getElementById('modal-title');

        function openApp(title, url) {
            modalTitle.innerText = title;
            iframe.src = url;
            modal.style.display = 'flex';
        }

        function closeApp() {
            modal.style.display = 'none';
            iframe.src = ''; // Clear it out to stop audio/memory
        }
    </script>
</body>
</html>
