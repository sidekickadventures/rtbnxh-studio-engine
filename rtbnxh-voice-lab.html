<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTBNXH Voice Lab</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #14141f;
            --bg-light: #1e1e2e;
            --accent-cyan: #00ffff;
            --accent-magenta: #ff00ff;
            --accent-green: #00ff66;
            --text: #ffffff;
            --text-dim: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(180deg, #0a0a0f 0%, #12121f 50%, #0a0a0f 100%);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 25px; letter-spacing: 2px; }
        .main-container {
            background: var(--bg-panel);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a3a;
            width: 100%;
            max-width: 600px;
        }
        .input-section { margin-bottom: 25px; }
        label { display: block; color: var(--accent-cyan); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        textarea {
            width: 100%; height: 120px; background: var(--bg-dark); border: 2px solid #2a2a3a;
            border-radius: 8px; padding: 15px; color: var(--text); font-size: 1rem; resize: none;
        }
        textarea:focus { outline: none; border-color: var(--accent-cyan); }
        .voice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .voice-btn {
            background: var(--bg-light); border: 2px solid #2a2a3a; border-radius: 8px;
            padding: 15px 10px; color: var(--text-dim); cursor: pointer; text-align: center;
        }
        .voice-btn:hover { border-color: var(--accent-magenta); color: var(--text); }
        .voice-btn.active { border-color: var(--accent-cyan); background: rgba(0, 255, 255, 0.1); color: var(--accent-cyan); }
        .voice-icon { font-size: 1.5rem; margin-bottom: 5px; display: block; }
        .voice-name { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .controls { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn {
            flex: 1; min-width: 150px; background: linear-gradient(180deg, #2a2a3a, #1a1a2a);
            border: 1px solid #3a3a4a; color: var(--text); padding: 15px 24px; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.2s;
        }
        .btn:hover { border-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        .btn-generate { background: linear-gradient(180deg, var(--accent-magenta), #cc00cc); border-color: var(--accent-magenta); }
        .btn-generate:hover { box-shadow: 0 0 25px rgba(255, 0, 255, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; font-size: 0.85rem; display: none; }
        .status.visible { display: block; }
        .status.loading { background: rgba(255, 102, 0, 0.2); border: 1px solid #ff6600; color: #ff6600; }
        .status.success { background: rgba(0, 255, 102, 0.2); border: 1px solid var(--accent-green); color: var(--accent-green); }
        .status.error { background: rgba(255, 51, 51, 0.2); border: 1px solid #ff3333; color: #ff3333; }
        .quick-texts { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .quick-btn { background: var(--bg-light); border: 1px solid #2a2a3a; color: var(--text-dim); padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
        .quick-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
    </style>
</head>
<body>
    <h1>🎤 RTBNXH Voice Lab</h1>
    <div class="subtitle">Browser Speech Synthesis</div>

    <div class="main-container">
        <div class="input-section">
            <label>Enter Your Text</label>
            <textarea id="textInput" placeholder="Type something here..."></textarea>
            <div class="quick-texts">
                <button class="quick-btn" onclick="setText('RTBNXH. Craft with intent. Own the outcome.')">RTBNXH</button>
                <button class="quick-btn" onclick="setText('Welcome to the future of music production.')">Welcome</button>
                <button class="quick-btn" onclick="setText('Lets make some hits.')">Lets Go</button>
                <button class="quick-btn" onclick="setText('Bitcoin native beats.')">BTC</button>
            </div>
        </div>

        <div class="input-section">
            <label>Select Voice</label>
            <div class="voice-grid">
                <div class="voice-btn active" data-voice="male" onclick="selectVoice(this)">
                    <span class="voice-icon">🎤</span>
                    <span class="voice-name">Male</span>
                </div>
                <div class="voice-btn" data-voice="female" onclick="selectVoice(this)">
                    <span class="voice-icon">🎤</span>
                    <span class="voice-name">Female</span>
                </div>
                <div class="voice-btn" data-voice="british" onclick="selectVoice(this)">
                    <span class="voice-icon">🎤</span>
                    <span class="voice-name">British</span>
                </div>
                <div class="voice-btn" data-voice="deep" onclick="selectVoice(this)">
                    <span class="voice-icon">🎸</span>
                    <span class="voice-name">Deep</span>
                </div>
                <div class="voice-btn" data-voice="fast" onclick="selectVoice(this)">
                    <span class="voice-icon">⚡</span>
                    <span class="voice-name">Fast</span>
                </div>
                <div class="voice-btn" data-voice="slow" onclick="selectVoice(this)">
                    <span class="voice-icon">🐢</span>
                    <span class="voice-name">Slow</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-generate" id="generateBtn" onclick="generateSpeech()">
                <span>⚡</span> Speak
            </button>
            <button class="btn" onclick="clearAll()">
                <span>🗑️</span> Clear
            </button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        let currentVoiceId = 'male';
        let voices = [];

        // Load voices when page loads
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                window.speechSynthesis.onvoiceschanged = () => {
                    voices = window.speechSynthesis.getVoices();
                };
            }
        }
        loadVoices();

        function setText(text) {
            document.getElementById('textInput').value = text;
        }

        function selectVoice(element) {
            document.querySelectorAll('.voice-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentVoiceId = element.dataset.voice;
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status visible ' + type;
        }

        function hideStatus() {
            document.getElementById('status').className = 'status';
        }

        function clearAll() {
            document.getElementById('textInput').value = '';
            hideStatus();
            window.speechSynthesis.cancel();
        }

        function generateSpeech() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                showStatus('Please enter some text first', 'error');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> Speaking...';
            showStatus('Speaking...', 'loading');

            try {
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                
                // Configure voice based on selection
                const voiceSettings = {
                    'male': { rate: 1, pitch: 1 },
                    'female': { rate: 1, pitch: 1.2 },
                    'british': { rate: 0.9, pitch: 0.95 },
                    'deep': { rate: 0.8, pitch: 0.7 },
                    'fast': { rate: 1.5, pitch: 1 },
                    'slow': { rate: 0.6, pitch: 1 }
                };
                
                const settings = voiceSettings[currentVoiceId] || voiceSettings['male'];
                utterance.rate = settings.rate;
                utterance.pitch = settings.pitch;

                // Try to find a good voice
                if (voices.length > 0) {
                    const voiceMap = {
                        'male': ['Google US English', 'Microsoft David', 'Samantha'],
                        'female': ['Google US English', 'Microsoft Zira', 'Victoria'],
                        'british': ['Google UK English', 'Microsoft Hazel'],
                        'deep': ['Google UK English Male', '低音'],
                        'fast': ['Google US English'],
                        'slow': ['Google US English']
                    };
                    
                    const preferred = voiceMap[currentVoiceId] || voiceMap['male'];
                    utterance.voice = voices.find(v => preferred.some(name => v.name.includes(name))) || voices[0];
                }

                utterance.onend = () => {
                    btn.disabled = false;
                    btn.innerHTML = '<span>⚡</span> Speak';
                    showStatus('Done!', 'success');
                };

                utterance.onerror = (e) => {
                    console.error('Speech error:', e);
                    btn.disabled = false;
                    btn.innerHTML = '<span>⚡</span> Speak';
                    showStatus('Error: ' + e.error, 'error');
                };

                window.speechSynthesis.speak(utterance);
                
            } catch (error) {
                console.error('Error:', error);
                btn.disabled = false;
                btn.innerHTML = '<span>⚡</span> Speak';
                showStatus('Error: ' + error.message, 'error');
            }
        }

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'Enter' && e.ctrlKey) {
                generateSpeech();
            }
        });
    </script>
</body>
</html>
